<footer>Generative AI for Data Analysis in the Public Sector | Session 04</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-footer="Generative AI for Data Analysis in the Public Sector | Session 04" data-theme="mahidol" lang="C" data-marpit-pagination="8" style="--paginate:true;--footer:Generative AI for Data Analysis in the Public Sector | Session 04;--theme:mahidol;" data-marpit-pagination-total="25">
<h2 id="prompt-%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87%E0%B8%AA%E0%B8%B3%E0%B8%AB%E0%B8%A3%E0%B8%B1%E0%B8%9A%E0%B8%A3%E0%B8%B2%E0%B8%A2%E0%B8%87%E0%B8%B2%E0%B8%99">Prompt ตัวอย่างสำหรับรายงาน</h2>
<ul>
<li>ให้ค่อย ๆ เขียนเป็นส่วนก่อน และตรวจสอบว่าตรงตามความต้องการหรือไม่</li>
<li>ทำการใส่ข้อมูลที่เตรียมไว้เพื่อให้ AI ทราบข้อมูลได้ถูกต้อง</li>
</ul>
<h3 id="%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87-prompt-%E0%B8%AA%E0%B8%B3%E0%B8%AB%E0%B8%A3%E0%B8%B1%E0%B8%9A%E0%B8%A3%E0%B8%B2%E0%B8%A2%E0%B8%87%E0%B8%B2%E0%B8%99-2-%E0%B8%AA%E0%B9%88%E0%B8%A7%E0%B8%99%E0%B9%81%E0%B8%A3%E0%B8%81">ตัวอย่าง Prompt สำหรับรายงาน 2 ส่วนแรก</h3>
<pre><code class="language-prompt">คุณคือ Data Analyst ภาครัฐ
ช่วยเขียนรายงานการวิเคราะห์ข้อมูลบริการประชาชน 4 จังหวัด (ข้อมูล 6 เดือน) โดยมีโครงสร้างดังนี้:
1) หัวข้อหรือโครงการ
2) วัตถุประสงค์และคำถามวิเคราะห์
</code></pre>
<footer>Generative AI for Data Analysis in the Public Sector | Session 04</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-footer="Generative AI for Data Analysis in the Public Sector | Session 04" data-theme="mahidol" lang="C" data-marpit-pagination="9" style="--paginate:true;--footer:Generative AI for Data Analysis in the Public Sector | Session 04;--theme:mahidol;" data-marpit-pagination-total="25">
<h2 id="prompt-%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87%E0%B8%AA%E0%B8%B3%E0%B8%AB%E0%B8%A3%E0%B8%B1%E0%B8%9A%E0%B8%A3%E0%B8%B2%E0%B8%A2%E0%B8%87%E0%B8%B2%E0%B8%99-%E0%B8%95%E0%B9%88%E0%B8%AD">Prompt ตัวอย่างสำหรับรายงาน (ต่อ)</h2>
<ul>
<li>เมื่อได้ส่วนที่ 1-2 แล้ว ก็ให้เขียนส่วนที่เหลือ โดยอิงจากข้อมูลที่ได้วิเคราะห์ใน Colab</li>
</ul>
<h3 id="%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87-prompt-%E0%B8%AA%E0%B8%B3%E0%B8%AB%E0%B8%A3%E0%B8%B1%E0%B8%9A%E0%B8%A3%E0%B8%B2%E0%B8%A2%E0%B8%87%E0%B8%B2%E0%B8%99-2-%E0%B8%AA%E0%B9%88%E0%B8%A7%E0%B8%99%E0%B9%81%E0%B8%A3%E0%B8%81-1">ตัวอย่าง Prompt สำหรับรายงาน 2 ส่วนแรก</h3>
<pre><code class="language-prompt">เขียนส่วน 3-6 ของรายงานการวิเคราะห์ข้อมูลบริการประชาชน 4 จังหวัด (ข้อมูล 6 เดือน) โดยมีโครงสร้างดังนี้:
3) ข้อมูลและวิธีการ
4) ผลการวิเคราะห์และข้อค้นพบ
5) ข้อเสนอแนะเชิงปฏิบัติ
6) ข้อจำกัดของข้อมูล/การวิเคราะห์
</code></pre>
<footer>Generative AI for Data Analysis in the Public Sector | Session 04</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-footer="Generative AI for Data Analysis in the Public Sector | Session 04" data-theme="mahidol" lang="C" data-marpit-pagination="10" style="--paginate:true;--footer:Generative AI for Data Analysis in the Public Sector | Session 04;--theme:mahidol;" data-marpit-pagination-total="25">
<h2 id="2-executive-summary">2) Executive Summary</h2>
<h3 id="%E0%B8%AD%E0%B8%87%E0%B8%84%E0%B9%8C%E0%B8%9B%E0%B8%A3%E0%B8%B0%E0%B8%81%E0%B8%AD%E0%B8%9A%E0%B8%AA%E0%B8%B3%E0%B8%84%E0%B8%B1%E0%B8%8D">องค์ประกอบสำคัญ</h3>
<ol>
<li>ประเด็นสำคัญที่สุด 2-3 ข้อ</li>
<li>หลักฐานเชิงข้อมูลที่รองรับ</li>
<li>ผลกระทบต่อการดำเนินงาน</li>
<li>ข้อเสนอแนะที่นำไปทำต่อได้ทันที</li>
</ol>
<h3 id="%E0%B8%A3%E0%B8%B9%E0%B8%9B%E0%B9%81%E0%B8%9A%E0%B8%9A%E0%B8%81%E0%B8%B2%E0%B8%A3%E0%B9%80%E0%B8%82%E0%B8%B5%E0%B8%A2%E0%B8%99">รูปแบบการเขียน</h3>
<ul>
<li>ใช้ภาษาสั้น กระชับ ตรงประเด็น</li>
<li>ระบุขอบเขตและข้อจำกัดให้ครบถ้วน</li>
<li>แยก &quot;ข้อเท็จจริง&quot; ออกจาก &quot;ข้อเสนอ&quot; ชัดเจน</li>
</ul>
<footer>Generative AI for Data Analysis in the Public Sector | Session 04</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-footer="Generative AI for Data Analysis in the Public Sector | Session 04" data-theme="mahidol" lang="C" data-marpit-pagination="11" style="--paginate:true;--footer:Generative AI for Data Analysis in the Public Sector | Session 04;--theme:mahidol;" data-marpit-pagination-total="25">
<h2 id="%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87-executive-summary">ตัวอย่าง: Executive Summary</h2>
<h3 id="example-question">Example question</h3>
<ul>
<li>ถ้าต้องสรุปให้ผู้บริหารตัดสินใจใน 1 หน้า ควรเน้นตัวเลขใดบ้าง</li>
</ul>
<h3 id="recommended-chart-or-method">Recommended chart or method</h3>
<ul>
<li>KPI card 4 ค่า: ผู้รับบริการรวม, สัดส่วนออนไลน์, เวลารอเฉลี่ย, ความพึงพอใจ</li>
<li>Heatmap จังหวัด x ตัวชี้วัด เพื่อเห็นจุดแข็ง/จุดเสี่ยงเร็ว</li>
</ul>
<h3 id="short-interpretation-%E0%B8%A0%E0%B8%B2%E0%B8%84%E0%B8%A3%E0%B8%B1%E0%B8%90">Short interpretation (ภาครัฐ)</h3>
<ul>
<li>สัดส่วนออนไลน์เพิ่มในทุกจังหวัด สะท้อนการยอมรับช่องทางดิจิทัล</li>
<li>เวลารอลดลงพร้อมความพึงพอใจเพิ่มขึ้น สื่อถึงคุณภาพบริการที่ดีขึ้น</li>
<li>ควรตั้งเป้าหมายรายจังหวัด แทนการใช้เป้าหมายเดียวทั้งประเทศ</li>
</ul>
<footer>Generative AI for Data Analysis in the Public Sector | Session 04</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-footer="Generative AI for Data Analysis in the Public Sector | Session 04" data-theme="mahidol" lang="C" data-marpit-pagination="12" style="--paginate:true;--footer:Generative AI for Data Analysis in the Public Sector | Session 04;--theme:mahidol;" data-marpit-pagination-total="25">
<h3 id="prompt-gemini--chatgpt">Prompt (Gemini / ChatGPT)</h3>
<pre><code class="language-prompt">เขียน Executive Summary ภาษาไทยสำหรับผู้บริหารภาครัฐ 
โครงสร้างบังคับ:
1) สาระสำคัญ 3 ข้อ
2) ผลกระทบต่อการดำเนินงาน
3) ข้อเสนอเชิงนโยบาย 3 เดือนข้างหน้า
ข้อกำหนด:
- ใส่ตัวเลขหลักฐานอย่างน้อย 4 ค่า
- แยก &quot;ข้อเท็จจริง&quot; และ &quot;ข้อเสนอ&quot; ชัดเจน
- ความยาวไม่เกิน 220 คำ
</code></pre>
<ul>
<li>ให้ทำต่อใน chat เดียวกับเขียนรายงาน เพื่อให้ AI เข้าใจบริบทได้ดีขึ้น</li>
</ul>
<footer>Generative AI for Data Analysis in the Public Sector | Session 04</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-footer="Generative AI for Data Analysis in the Public Sector | Session 04" data-theme="mahidol" lang="C" data-marpit-pagination="13" style="--paginate:true;--footer:Generative AI for Data Analysis in the Public Sector | Session 04;--theme:mahidol;" data-marpit-pagination-total="25">
<h2 id="3-%E0%B8%81%E0%B8%B2%E0%B8%A3%E0%B8%AA%E0%B8%A3%E0%B9%89%E0%B8%B2%E0%B8%87%E0%B8%AA%E0%B9%84%E0%B8%A5%E0%B8%94%E0%B9%8C%E0%B8%94%E0%B9%89%E0%B8%A7%E0%B8%A2-ai">3) การสร้างสไลด์ด้วย AI</h2>
<h3 id="workflow-%E0%B8%97%E0%B8%B5%E0%B9%88%E0%B9%81%E0%B8%99%E0%B8%B0%E0%B8%99%E0%B8%B3">Workflow ที่แนะนำ</h3>
<ol>
<li>สกัดสารสำคัญจากรายงาน</li>
<li>จัดลำดับเรื่อง: ปัญหา -&gt; หลักฐาน -&gt; ทางเลือก -&gt; ข้อเสนอ</li>
<li>ให้ AI ช่วยย่อเนื้อหาเป็น bullet ที่อ่านง่าย</li>
<li>ตรวจทานความถูกต้องเชิงเนื้อหาอีกครั้ง</li>
</ol>
<h3 id="%E0%B9%81%E0%B8%99%E0%B8%A7%E0%B8%84%E0%B8%B4%E0%B8%94%E0%B8%81%E0%B8%B2%E0%B8%A3%E0%B8%AD%E0%B8%AD%E0%B8%81%E0%B9%81%E0%B8%9A%E0%B8%9A">แนวคิดการออกแบบ</h3>
<ul>
<li>1 สไลด์ = 1 ประเด็นหลัก</li>
<li>ใช้กราฟที่เชื่อมกับข้อสรุปโดยตรง</li>
<li>จำกัดข้อความให้ผู้ฟังตามทัน</li>
</ul>
<footer>Generative AI for Data Analysis in the Public Sector | Session 04</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-footer="Generative AI for Data Analysis in the Public Sector | Session 04" data-theme="mahidol" lang="C" data-marpit-pagination="14" style="--paginate:true;--footer:Generative AI for Data Analysis in the Public Sector | Session 04;--theme:mahidol;" data-marpit-pagination-total="25">
<h2 id="%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87-%E0%B8%AA%E0%B9%84%E0%B8%A5%E0%B8%94%E0%B9%8C%E0%B8%AA%E0%B8%B3%E0%B8%AB%E0%B8%A3%E0%B8%B1%E0%B8%9A%E0%B8%9C%E0%B8%B9%E0%B9%89%E0%B8%9A%E0%B8%A3%E0%B8%B4%E0%B8%AB%E0%B8%B2%E0%B8%A3">ตัวอย่าง: สไลด์สำหรับผู้บริหาร</h2>
<h3 id="example-question-1">Example question</h3>
<ul>
<li>จะเล่าเรื่องอย่างไรให้ตัดสินใจได้ภายใน 5 นาที</li>
</ul>
<h3 id="short-interpretation-%E0%B8%A0%E0%B8%B2%E0%B8%84%E0%B8%A3%E0%B8%B1%E0%B8%90-1">Short interpretation (ภาครัฐ)</h3>
<ul>
<li>ข้อมูลชี้ว่า &quot;ดิจิทัลมากขึ้น&quot; ไปในทิศทางเดียวกับ &quot;ความพึงพอใจดีขึ้น&quot;</li>
<li>ต้องใช้มาตรการเฉพาะพื้นที่ที่ยังรอคิวนาน เพื่อปิดช่องว่างคุณภาพบริการ</li>
</ul>
<footer>Generative AI for Data Analysis in the Public Sector | Session 04</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-footer="Generative AI for Data Analysis in the Public Sector | Session 04" data-theme="mahidol" lang="C" data-marpit-pagination="15" style="--paginate:true;--footer:Generative AI for Data Analysis in the Public Sector | Session 04;--theme:mahidol;" data-marpit-pagination-total="25">
<h2 id="recommended-chart-or-method-1">Recommended chart or method</h2>
<ul>
<li>Slide 1: สถานการณ์รวม (KPI card)</li>
<li>Slide 2: แนวโน้มเวลารอรายจังหวัด (line chart)</li>
<li>Slide 3: ออนไลน์ vs ความพึงพอใจ (scatter plot)</li>
<li>Slide 4: ข้อเสนอเชิงนโยบายพร้อมตัวชี้วัดติดตามผล</li>
</ul>
<footer>Generative AI for Data Analysis in the Public Sector | Session 04</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-footer="Generative AI for Data Analysis in the Public Sector | Session 04" data-theme="mahidol" lang="C" data-marpit-pagination="16" style="--paginate:true;--footer:Generative AI for Data Analysis in the Public Sector | Session 04;--theme:mahidol;" data-marpit-pagination-total="25">

<footer>Generative AI for Data Analysis in the Public Sector | Session 04</footer>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-footer="Generative AI for Data Analysis in the Public Sector | Session 04" data-theme="mahidol" lang="C" data-marpit-pagination="17" style="--paginate:true;--footer:Generative AI for Data Analysis in the Public Sector | Session 04;--theme:mahidol;" data-marpit-pagination-total="25">
<h3 id="prompt-gemini--chatgpt-1">Prompt (Gemini / ChatGPT)</h3>
<pre><code class="language-prompt">สร้างโครงสไลด์ 6 หน้า สำหรับผู้บริหารภาครัฐ จากผลวิเคราะห์บริการประชาชน 4 จังหวัด (นำเข้าจาก Colab)
ลำดับเรื่อง: ปัญหา -&gt; หลักฐาน -&gt; ทางเลือก -&gt; ข้อเสนอ
ระบุในแต่ละสไลด์:
- ชื่อสไลด์ (ไม่เกิน 8 คำ)
- key message 1 ประโยค
- กราฟที่ควรใช้
น้ำเสียง: กระชับ น่าเชื่อถือ พร้อมใช้ประชุม
</code></pre>
<footer>Generative AI for Data Analysis in the Public Sector | Session 04</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-footer="Generative AI for Data Analysis in the Public Sector | Session 04" data-theme="mahidol" lang="C" data-marpit-pagination="18" style="--paginate:true;--footer:Generative AI for Data Analysis in the Public Sector | Session 04;--theme:mahidol;" data-marpit-pagination-total="25">
<h2 id="4-%E0%B9%80%E0%B8%97%E0%B8%84%E0%B8%99%E0%B8%B4%E0%B8%84%E0%B8%81%E0%B8%B2%E0%B8%A3%E0%B8%AA%E0%B8%B7%E0%B9%88%E0%B8%AD%E0%B8%AA%E0%B8%B2%E0%B8%A3%E0%B9%80%E0%B8%9E%E0%B8%B7%E0%B9%88%E0%B8%AD%E0%B8%81%E0%B8%B2%E0%B8%A3%E0%B8%95%E0%B8%B1%E0%B8%94%E0%B8%AA%E0%B8%B4%E0%B8%99%E0%B9%83%E0%B8%88">4) เทคนิคการสื่อสารเพื่อการตัดสินใจ</h2>
<h3 id="%E0%B8%AA%E0%B8%B7%E0%B9%88%E0%B8%AD%E0%B8%AA%E0%B8%B2%E0%B8%A3%E0%B9%83%E0%B8%AB%E0%B9%89%E0%B9%80%E0%B8%81%E0%B8%B4%E0%B8%94-action">สื่อสารให้เกิด Action</h3>
<ul>
<li>ระบุ &quot;สิ่งที่ควรทำต่อ&quot; อย่างชัดเจน</li>
<li>แสดงทางเลือกพร้อมผลดี-ผลเสี่ยง</li>
<li>ใช้ตัวเลขสำคัญเพื่อยืนยันน้ำหนักของข้อเสนอ</li>
<li>เตรียมคำตอบสำหรับคำถามคาดการณ์ล่วงหน้า</li>
</ul>
<h3 id="%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87%E0%B8%9B%E0%B8%A3%E0%B8%B0%E0%B9%82%E0%B8%A2%E0%B8%84%E0%B8%9B%E0%B8%B4%E0%B8%94%E0%B8%81%E0%B8%B2%E0%B8%A3%E0%B8%99%E0%B8%B3%E0%B9%80%E0%B8%AA%E0%B8%99%E0%B8%AD">ตัวอย่างประโยคปิดการนำเสนอ</h3>
<blockquote>
<p>&quot;ข้อเสนอที่เหมาะสมที่สุดในระยะ 3 เดือน คือ ... โดยใช้ตัวชี้วัด ... เพื่อติดตามผล&quot;</p>
</blockquote>
<footer>Generative AI for Data Analysis in the Public Sector | Session 04</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-footer="Generative AI for Data Analysis in the Public Sector | Session 04" data-theme="mahidol" lang="C" data-marpit-pagination="19" style="--paginate:true;--footer:Generative AI for Data Analysis in the Public Sector | Session 04;--theme:mahidol;" data-marpit-pagination-total="25">
<h2 id="%E0%B8%95%E0%B8%B1%E0%B8%A7%E0%B8%AD%E0%B8%A2%E0%B9%88%E0%B8%B2%E0%B8%87%E0%B8%82%E0%B9%89%E0%B8%AD%E0%B8%84%E0%B8%A7%E0%B8%B2%E0%B8%A1%E0%B8%AA%E0%B8%B7%E0%B9%88%E0%B8%AD%E0%B8%AA%E0%B8%B2%E0%B8%A3%E0%B9%80%E0%B8%8A%E0%B8%B4%E0%B8%87%E0%B8%99%E0%B9%82%E0%B8%A2%E0%B8%9A%E0%B8%B2%E0%B8%A2">ตัวอย่างข้อความสื่อสารเชิงนโยบาย</h2>
<h3 id="example-question-2">Example question</h3>
<ul>
<li>จะพูด &quot;ข้อเสนอ&quot; อย่างไรให้ผู้บริหารสั่งการต่อได้ทันที</li>
</ul>
<h3 id="recommended-chart-or-method-2">Recommended chart or method</h3>
<ul>
<li>Decision table: ทางเลือก | ผลที่คาด | ความเสี่ยง | ทรัพยากรที่ต้องใช้</li>
</ul>
<h3 id="short-interpretation-%E0%B8%A0%E0%B8%B2%E0%B8%84%E0%B8%A3%E0%B8%B1%E0%B8%90-2">Short interpretation (ภาครัฐ)</h3>
<ul>
<li>ระยะสั้น: เพิ่มช่วงเวลาให้บริการออนไลน์ในจังหวัดที่คิวหนาแน่น</li>
<li>ระยะกลาง: ยกระดับการนัดหมายล่วงหน้าเพื่อลดคอขวดหน้าจุดบริการ</li>
<li>ระยะติดตามผล: ใช้ 3 KPI เดียวกันทุกจังหวัดเพื่อเทียบผลรายเดือน</li>
</ul>
<footer>Generative AI for Data Analysis in the Public Sector | Session 04</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-footer="Generative AI for Data Analysis in the Public Sector | Session 04" data-theme="mahidol" lang="C" data-marpit-pagination="20" style="--paginate:true;--footer:Generative AI for Data Analysis in the Public Sector | Session 04;--theme:mahidol;" data-marpit-pagination-total="25">
<h3 id="prompt-gemini--chatgpt-2">Prompt (Gemini / ChatGPT)</h3>
<pre><code class="language-prompt">จากข้อค้นพบเรื่องเวลารอและความพึงพอใจ 
ช่วยร่าง &quot;ข้อเสนอเชิงนโยบาย&quot; 3 ทางเลือก
รูปแบบต่อทางเลือก:
- มาตรการ
- ผลที่คาดภายใน 3 เดือน
- ความเสี่ยง
- KPI ติดตามผล 2 ตัว
เขียนให้ผู้ว่าราชการจังหวัดอ่านแล้วสั่งการต่อได้ทันที
</code></pre>
<footer>Generative AI for Data Analysis in the Public Sector | Session 04</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-footer="Generative AI for Data Analysis in the Public Sector | Session 04" data-theme="mahidol" lang="C" data-marpit-pagination="21" style="--paginate:true;--footer:Generative AI for Data Analysis in the Public Sector | Session 04;--theme:mahidol;" data-marpit-pagination-total="25">
<h2 id="workshop-4">Workshop 4</h2>
<h3 id="%E0%B8%81%E0%B8%B4%E0%B8%88%E0%B8%81%E0%B8%A3%E0%B8%A3%E0%B8%A1%E0%B8%9D%E0%B8%B6%E0%B8%81%E0%B8%9B%E0%B8%8F%E0%B8%B4%E0%B8%9A%E0%B8%B1%E0%B8%95%E0%B8%B4">กิจกรรมฝึกปฏิบัติ</h3>
<ol>
<li>เลือกคำถามวิเคราะห์จาก Session 02</li>
<li>ออกแบบกราฟอย่างน้อย 3 แบบ</li>
<li>ใช้ Gemini in Colab ช่วยสร้าง/ปรับโค้ด</li>
<li>สรุปข้อความ insight ต่อกราฟละ 1-2 ประโยค</li>
<li>เขียนรายงานสั้น ๆ พร้อม Executive Summary</li>
<li>สร้างสไลด์นำเสนอผลวิเคราะห์ด้วย AI (6 หน้า)</li>
<li>ซ้อมนำเสนอและเตรียมตอบคำถาม</li>
</ol>
<footer>Generative AI for Data Analysis in the Public Sector | Session 04</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-footer="Generative AI for Data Analysis in the Public Sector | Session 04" data-theme="mahidol" lang="C" data-marpit-pagination="22" style="--paginate:true;--footer:Generative AI for Data Analysis in the Public Sector | Session 04;--theme:mahidol;" data-marpit-pagination-total="25">
<h3 id="runnable-snippet-colab">Runnable snippet (Colab)</h3>
<pre><code class="language-python"><span class="hljs-keyword">import</span> pandas <span class="hljs-keyword">as</span> pd

df = pd.read_csv(<span class="hljs-string">&#x27;session-03-workshop-sample-data.csv&#x27;</span>)
df[<span class="hljs-string">&#x27;สัดส่วนออนไลน์(%)&#x27;</span>] = (df[<span class="hljs-string">&#x27;จำนวนผ่านช่องทางออนไลน์(คน)&#x27;</span>] / df[<span class="hljs-string">&#x27;จำนวนผู้รับบริการทั้งหมด(คน)&#x27;</span>] * <span class="hljs-number">100</span>).<span class="hljs-built_in">round</span>(<span class="hljs-number">1</span>)

summary = df.groupby(<span class="hljs-string">&#x27;จังหวัด&#x27;</span>).agg({
  <span class="hljs-string">&#x27;เวลารอเฉลี่ย(นาที)&#x27;</span>: [<span class="hljs-string">&#x27;first&#x27;</span>, <span class="hljs-string">&#x27;last&#x27;</span>],
  <span class="hljs-string">&#x27;ความพึงพอใจ(%)&#x27;</span>: [<span class="hljs-string">&#x27;first&#x27;</span>, <span class="hljs-string">&#x27;last&#x27;</span>],
  <span class="hljs-string">&#x27;สัดส่วนออนไลน์(%)&#x27;</span>: [<span class="hljs-string">&#x27;first&#x27;</span>, <span class="hljs-string">&#x27;last&#x27;</span>]
})
<span class="hljs-built_in">print</span>(summary)
</code></pre>
<footer>Generative AI for Data Analysis in the Public Sector | Session 04</footer>
</section>
