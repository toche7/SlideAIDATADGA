<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Problem to Data Question Flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb" />
    </marker>
    <style>
      .title { font: 700 44px 'Sarabun', 'Noto Sans Thai', sans-serif; fill: #1e3a8a; }
      .label { font: 600 28px 'Sarabun', 'Noto Sans Thai', sans-serif; fill: #1f2937; }
      .text { font: 500 23px 'Sarabun', 'Noto Sans Thai', sans-serif; fill: #334155; }
      .small { font: 500 20px 'Sarabun', 'Noto Sans Thai', sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="800" rx="24" fill="url(#bg)"/>
  <text x="600" y="86" text-anchor="middle" class="title">From Policy Problem to Data Question</text>

  <rect x="80" y="170" width="300" height="130" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="230" y="225" text-anchor="middle" class="label">Policy Goal</text>
  <text x="230" y="260" text-anchor="middle" class="small">What do we need to improve?</text>

  <rect x="450" y="170" width="300" height="130" rx="18" fill="#e0f2fe" stroke="#0891b2" stroke-width="3"/>
  <text x="600" y="225" text-anchor="middle" class="label">Indicators</text>
  <text x="600" y="260" text-anchor="middle" class="small">How do we measure success?</text>

  <rect x="820" y="170" width="300" height="130" rx="18" fill="#ecfeff" stroke="#0e7490" stroke-width="3"/>
  <text x="970" y="225" text-anchor="middle" class="label">Data Scope</text>
  <text x="970" y="260" text-anchor="middle" class="small">Time - Area - Agency</text>

  <line x1="380" y1="235" x2="450" y2="235" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="750" y1="235" x2="820" y2="235" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="220" y="420" width="760" height="220" rx="20" fill="#ffffff" stroke="#1e3a8a" stroke-width="4"/>
  <text x="600" y="485" text-anchor="middle" class="label">Data Question</text>
  <text x="600" y="535" text-anchor="middle" class="text">Which factors are associated with service delay?</text>
  <text x="600" y="575" text-anchor="middle" class="text">What can the agency change first for quick impact?</text>

  <line x1="600" y1="300" x2="600" y2="420" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
